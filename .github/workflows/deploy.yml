name: Auto-Deploy to NAS
on:
  push:
    branches: [ main ] # Prüfe, ob dein Branch "main" oder "master" heißt

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          npm install
          npm run build
      - name: Deploy via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_IP }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: 22 # Oder dein geänderter SSH-Port
          source: "dist/*" # Oder "build/*", je nachdem was npm build erstellt
          target: "/volume1/web/dein_zielordner"
          strip_components: 1
